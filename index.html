<script>
    async function fetchShows() {
        const CALENDAR_ID = 'u3shlpf40gp94v4aghhcugr288@group.calendar.google.com';
        const API_KEY = 'AIzaSyAqfx1Eb49_aRPJ5tmTQgWD92PXnWpiogo';

        const now = new Date().toISOString();
        const URL = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${now}&singleEvents=true&orderBy=startTime&maxResults=10`;

        try {
            const response = await fetch(URL);
            const data = await response.json();

            // No events, or an API error: leave the whole section hidden.
            if (data.error || !data.items || data.items.length === 0) {
                return;
            }

            document.getElementById('calendar-feed').innerHTML = data.items.map(event => {
                const start = event.start.dateTime || event.start.date;
                const date = new Date(start);
                const hasTime = Boolean(event.start.dateTime);
                const opts = hasTime
                    ? { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true }
                    : { month: 'long', day: 'numeric', year: 'numeric' };
                const formattedDate = date.toLocaleString('en-US', opts);

                return `
                    <div class="show-item">
                        <h3>${event.summary}</h3>
                        <p>${formattedDate}${event.location ? ' — ' + event.location : ''}</p>
                    </div>
                    <hr>
                `;
            }).join('');

            // Reveal the section only once we actually have shows to show.
            document.getElementById('shows-section').style.display = 'block';

        } catch (error) {
            // On failure, leave the section hidden so the home page never looks broken.
        }
    }

    fetchShows();
</script>
