    <div class="branding-bar">

    <main class="content-area">
        <section class="shows-section">
            <h2>Upcoming Shows</h2>
            <hr>
            <div id="calendar-feed">
                <p>Loading shows...</p>
            </div>
        </section>
    </main>

<script>
    const CALENDAR_ID = 'u3shlpf40gp9v4aghhcugr288@group.calendar.google.com';
    const API_KEY = 'AIzaSyAqfx1Eb49_aRPJ5tmTQgWD92PXnWpiogo';
    
    // Explicit URL format
    const now = new Date().toISOString();
    const encodedID = encodeURIComponent(CALENDAR_ID);
    const URL = `https://www.googleapis.com/calendar/v3/calendars/${encodedID}/events?key=${API_KEY}&timeMin=${now}&singleEvents=true&orderBy=startTime&maxResults=5`;

    async function fetchShows() {
        try {
            const response = await fetch(URL);
            const data = await response.json();
            
            // Log the full response to the console for debugging
            console.log("Google API Response:", data);

            if (data.error) {
                document.getElementById('calendar-feed').innerHTML = `<p>Error: ${data.error.message}</p>`;
                return;
            }

            const container = document.getElementById('calendar-feed');
            
            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<p>No upcoming shows scheduled. Check back soon!</p>';
                return;
            }

            container.innerHTML = data.items.map(event => {
                const start = event.start.dateTime || event.start.date;
                const date = new Date(start);
                const formattedDate = date.toLocaleString('en-US', {
                    month: 'long',
                    day: 'numeric',
                    year: 'numeric',
                    hour: 'numeric',
                    minute: '2-digit',
                    hour12: true
                });

                return `
                    <div class="show-item">
                        <h3>${event.summary}</h3>
                        <p>${formattedDate}${event.location ? ' — ' + event.location : ''}</p>
                    </div>
                    <hr>
                `;
            }).join('');

        } catch (error) {
            console.error('Fetch error:', error);
            document.getElementById('calendar-feed').innerHTML = '<p>Unable to connect to calendar.</p>';
        }
    }

    fetchShows();
</script>
</body>
</html>
