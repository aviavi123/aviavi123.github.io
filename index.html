</head>
<body>

   <header>

            <li><a href="#">Bio</a></li>

            <li><a href="#">Visuals</a></li>
        </ul>
    </nav>

    <div class="branding-bar">
        <h1>Avi Bortnick</h1>
        <div class="social-icons">
            <a href="https://open.spotify.com/artist/4aHl1qC3nLIybYg8TO3Wip" target="_blank" title="Spotify"><i class="fa-brands fa-spotify"></i></a>
            <a href="https://www.instagram.com/avibortnick/" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>

</header>

    <main class="content-area">
        <section class="shows-section">
            <h2>Upcoming Shows</h2>
            <hr>
            <div id="calendar-feed">
                <p>Loading shows...</p>
            </div>
        </section>
    </main>

   <script>
    // Using your specific Calendar ID and API Key
    const CALENDAR_ID = 'u3shlpf40gp9v4aghhcugr288@group.calendar.google.com';
    const API_KEY = 'AIzaSyAqfx1Eb49_aRPJ5tmTQgWD92PXnWpiogo';
    
    // We start looking from 24 hours ago to catch any timezone overlaps
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    
    const URL = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${yesterday.toISOString()}&singleEvents=true&orderBy=startTime&maxResults=10`;

    async function fetchShows() {
        console.log("Fetching from:", URL); // This helps you debug in the browser console
        try {
            const response = await fetch(URL);
            const data = await response.json();
            const container = document.getElementById('calendar-feed');
            
            if (data.error) {
                console.error("Google API Error:", data.error.message);
                container.innerHTML = `<p>Error: ${data.error.message}</p>`;
                return;
            }

            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<p>No upcoming shows found on this calendar.</p>';
                return;
            }

            container.innerHTML = data.items.map(event => {
                const start = event.start.dateTime || event.start.date;
                const date = new Date(start);
                const options = { month: 'long', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit' };
                const formattedDate = date.toLocaleDateString('en-US', options);

                return `
                    <div class="show-item">
                        <h3>${event.summary}</h3>
                        <p>${formattedDate}${event.location ? ' — ' + event.location : ''}</p>
                    </div>
                    <hr>
                `;
            }).join('');

        } catch (error) {
            console.error('Fetch Error:', error);
            document.getElementById('calendar-feed').innerHTML = '<p>Unable to connect to calendar.</p>';
        }
    }

    fetchShows();
</script>
</body>
</html>
