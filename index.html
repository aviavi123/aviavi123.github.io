                <p>Loading shows...</p>
            </div>
        </section>
    </main>

<script>
    async function fetchShows() {
        const CALENDAR_ID = 'u3shlpf40gp94v4aghhcugr288@group.calendar.google.com';
        const API_KEY = 'AIzaSyAqfx1Eb49_aRPJ5tmTQgWD92PXnWpiogo';
        
        const now = new Date().toISOString();
        const URL = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${now}&singleEvents=true&orderBy=startTime&maxResults=5`;

        // This will let us click the link in the console to see exactly what Google sees
        console.log("Requesting URL:", URL);

        try {
            const response = await fetch(URL);
            const data = await response.json();
            
            console.log("Data returned:", data);

            const container = document.getElementById('calendar-feed');
            
            if (data.error) {
                container.innerHTML = `<p>Google API Error: ${data.error.message}</p>`;
                return;
            }

            if (!data.items || data.items.length === 0) {
                container.innerHTML = '<p>No upcoming shows found.</p>';
                return;
            }

            container.innerHTML = data.items.map(event => {
                const start = event.start.dateTime || event.start.date;
                const date = new Date(start);
                const formattedDate = date.toLocaleString('en-US', {
                    month: 'long', day: 'numeric', year: 'numeric',
                    hour: 'numeric', minute: '2-digit', hour12: true
                });

                return `
                    <div class="show-item">
                        <h3>${event.summary}</h3>
                        <p>${formattedDate}${event.location ? ' — ' + event.location : ''}</p>
                    </div>
                    <hr>
                `;
            }).join('');

        } catch (error) {
            document.getElementById('calendar-feed').innerHTML = '<p>Connection failed.</p>';
        }
    }

    fetchShows();
</script>
